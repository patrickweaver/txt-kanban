<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cranban</title>
    <!-- Social -->
    <meta property="og:title" content="Cranban" />
    <meta property="og:description"
      content="A local-first cranberry themed kanban board with a markdown datastore." />
    <!-- Needs to be exactly a 2:1 ratio for Twitter, recommend 800 x 400 px -->
    <meta property="og:image" content="https://doodles.patrickweaver.net/cranban/images/cranban-preview.png" />
    
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@patrickweave_r" />
    <meta name="twitter:title" content="Cranban" />
    <meta name="twitter:description"
      content="A local-first cranberry themed kanban board with a markdown datastore." />
    <!-- Needs to be exactly a 2:1 ratio for Twitter, recommend 800 x 400 px -->
    <meta name="twitter:image" content="https://doodles.patrickweaver.net/cranban/images/cranban-preview.png" />
    <script>
      // Apply the stored theme before first paint, so a refresh doesn't flash
      // the default theme before React mounts. Key matches THEME_STORAGE_KEY
      // in src/themes.ts; an unknown value is left to the app to sort out.
      try {
        var t = localStorage.getItem("kanban.theme");
        if (t) document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
